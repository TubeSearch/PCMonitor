<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>System Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --glass-shine: rgba(255,255,255,0.18);
    --blur: 28px;
    --accent-blue: #3b9eff;
    --accent-green: #30d158;
    --accent-yellow: #ffd60a;
    --accent-red: #ff453a;
    --accent-purple: #bf5af2;
    --text-primary: rgba(255,255,255,0.92);
    --text-secondary: rgba(255,255,255,0.48);
    --text-tertiary: rgba(255,255,255,0.28);
    --bg-deep: #050810;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background orbs */
  .bg-orbs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift 18s ease-in-out infinite alternate;
  }
  .orb1 { width: 500px; height: 500px; background: radial-gradient(circle, #3b9eff, transparent); top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 400px; height: 400px; background: radial-gradient(circle, #bf5af2, transparent); bottom: -50px; right: -80px; animation-delay: -6s; }
  .orb3 { width: 300px; height: 300px; background: radial-gradient(circle, #30d158, transparent); top: 40%; left: 40%; animation-delay: -12s; }

  @keyframes drift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, 30px) scale(1.08); }
  }

  /* Layout */
  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 40px;
  }

  /* Header */
  .header {
    padding: 60px 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .header-title {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.6) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-sub {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
    margin-top: 2px;
  }
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 10px var(--accent-green);
    animation: pulse 2s ease-in-out infinite;
    margin-bottom: 4px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  /* Glass card */
  .glass {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, border-color 0.2s;
  }
  .glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, var(--glass-shine) 0%, transparent 50%);
    pointer-events: none;
  }
  .glass:active { transform: scale(0.985); }

  /* Section label */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin: 28px 0 10px 4px;
  }

  /* Stat row (big 2-col grid) */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat-card {
    padding: 20px 18px;
  }
  .stat-icon {
    font-size: 22px;
    margin-bottom: 10px;
    display: block;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -1px;
    line-height: 1;
    margin: 6px 0 10px;
    font-family: 'DM Sans', sans-serif;
  }
  .stat-value span { font-size: 14px; font-weight: 400; opacity: 0.6; }

  /* Liquid bar */
  .bar-track {
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 12px;
    border-radius: 99px;
    background: rgba(255,255,255,0.5);
    filter: blur(3px);
  }

  .bar-blue  { background: linear-gradient(90deg, #1d6fe8, #3b9eff); }
  .bar-green { background: linear-gradient(90deg, #1b8a3c, #30d158); }
  .bar-yellow{ background: linear-gradient(90deg, #b89400, #ffd60a); }
  .bar-red   { background: linear-gradient(90deg, #c0261e, #ff453a); }
  .bar-purple{ background: linear-gradient(90deg, #8832c4, #bf5af2); }

  /* Wide card */
  .wide-card {
    padding: 20px 20px;
    margin-bottom: 12px;
  }
  .wide-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .wide-card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .wide-card-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  /* Network card */
  .net-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .net-item {
    text-align: center;
    flex: 1;
  }
  .net-item:first-child { text-align: left; }
  .net-item:last-child  { text-align: right; }
  .net-arrow { font-size: 18px; color: var(--text-tertiary); }
  .net-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
  .net-val   { font-size: 22px; font-weight: 300; }
  .net-unit  { font-size: 12px; color: var(--text-secondary); }

  /* Battery */
  .battery-card {
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }
  .battery-icon-wrap {
    position: relative;
    width: 48px;
    height: 24px;
    border: 2px solid var(--glass-border);
    border-radius: 5px;
    flex-shrink: 0;
  }
  .battery-icon-wrap::after {
    content: '';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 10px;
    background: var(--glass-border);
    border-radius: 0 2px 2px 0;
  }
  .battery-fill {
    position: absolute;
    inset: 2px;
    border-radius: 2px;
    transition: width 0.7s ease;
  }
  .battery-info { flex: 1; }
  .battery-pct  { font-size: 24px; font-weight: 300; }
  .battery-status { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* Process list */
  .proc-list { display: flex; flex-direction: column; gap: 0; }
  .proc-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.1s;
  }
  .proc-row:last-child { border-bottom: none; }
  .proc-row:first-child { border-radius: 20px 20px 0 0; }
  .proc-row:last-child  { border-radius: 0 0 20px 20px; }
  .proc-name {
    flex: 1;
    font-size: 13px;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-primary);
  }
  .proc-pid {
    font-size: 11px;
    color: var(--text-tertiary);
    min-width: 36px;
    text-align: right;
  }
  .proc-cpu, .proc-mem {
    font-size: 12px;
    font-weight: 500;
    min-width: 44px;
    text-align: right;
  }
  .proc-cpu { color: var(--accent-blue); }
  .proc-mem { color: var(--accent-purple); }
  .proc-col-header {
    display: flex;
    padding: 6px 18px 4px;
    gap: 10px;
  }
  .proc-col-header span {
    font-size: 10px;
    color: var(--text-tertiary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .proc-col-header .ch-name { flex: 1; }
  .proc-col-header .ch-pid  { min-width: 36px; text-align: right; }
  .proc-col-header .ch-cpu  { min-width: 44px; text-align: right; }
  .proc-col-header .ch-mem  { min-width: 44px; text-align: right; }

  /* Timestamp */
  .timestamp {
    text-align: center;
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 24px;
    padding-bottom: 20px;
    letter-spacing: 0.04em;
  }

  /* Error banner */
  .error-banner {
    display: none;
    background: rgba(255,69,58,0.15);
    border: 1px solid rgba(255,69,58,0.3);
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 13px;
    color: var(--accent-red);
    margin-bottom: 12px;
    text-align: center;
  }

  /* Freeze button */
  .freeze-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 11px 16px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    width: 100%;
    justify-content: center;
    letter-spacing: 0.01em;
    position: relative;
    overflow: hidden;
  }
  .freeze-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--glass-shine) 0%, transparent 50%);
    pointer-events: none;
  }
  .freeze-btn:active { transform: scale(0.97); }
  .freeze-btn.frozen {
    background: rgba(59,158,255,0.12);
    border-color: rgba(59,158,255,0.35);
    color: var(--accent-blue);
  }
  .freeze-icon { font-size: 15px; transition: transform 0.3s; }
  .freeze-btn.frozen .freeze-icon { transform: rotate(-20deg); }

  .proc-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .proc-frozen-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-blue);
    background: rgba(59,158,255,0.12);
    border: 1px solid rgba(59,158,255,0.25);
    border-radius: 6px;
    padding: 2px 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .proc-frozen-badge.visible { opacity: 1; }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: none;
    width: 90%;
    max-width: 320px;
  }
  .toast {
    background: rgba(24,26,36,0.95);
    border: 1px solid rgba(255,255,255,0.13);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 16px;
    padding: 13px 20px;
    font-size: 13px;
    color: var(--text-primary);
    width: 100%;
    text-align: center;
    line-height: 1.45;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    opacity: 0;
    transform: translateY(14px) scale(0.94);
    transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .toast.hide {
    opacity: 0;
    transform: translateY(10px) scale(0.96);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  /* Skeleton shimmer */
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position:  400px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 800px 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
    height: 14px;
    width: 60%;
  }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="app">
  <div class="header">
    <div>
      <div class="header-title">System</div>
      <div class="header-sub" id="hostname">Loading…</div>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="error-banner" id="errorBanner">
    ⚠ Cannot reach backend — make sure <code>monitor.py</code> is running.
  </div>

  <!-- CPU + RAM -->
  <div class="section-label">Resources</div>
  <div class="stats-grid">
    <div class="glass stat-card">
      <span class="stat-icon">⚡</span>
      <div class="stat-label">CPU</div>
      <div class="stat-value" id="cpuVal">—<span>%</span></div>
      <div class="bar-track"><div class="bar-fill bar-blue" id="cpuBar" style="width:0%"></div></div>
    </div>
    <div class="glass stat-card">
      <span class="stat-icon">🧠</span>
      <div class="stat-label">Memory</div>
      <div class="stat-value" id="memVal">—<span>%</span></div>
      <div class="bar-track"><div class="bar-fill bar-purple" id="memBar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Disk -->
  <div class="section-label">Storage</div>
  <div class="glass wide-card">
    <div class="wide-card-header">
      <div class="wide-card-title">💾 Disk (root)</div>
      <div class="wide-card-val" id="diskDetail">—</div>
    </div>
    <div class="bar-track"><div class="bar-fill bar-yellow" id="diskBar" style="width:0%"></div></div>
  </div>

  <!-- Network -->
  <div class="section-label">Network</div>
  <div class="glass wide-card">
    <div class="net-row">
      <div class="net-item">
        <div class="net-val" id="netRecv">—</div>
        <div class="net-unit">MB</div>
        <div class="net-label">↓ Received</div>
      </div>
      <div class="net-item" style="text-align:center;">
        <div class="net-arrow">⇅</div>
      </div>
      <div class="net-item">
        <div class="net-val" id="netSent">—</div>
        <div class="net-unit">MB</div>
        <div class="net-label">↑ Sent</div>
      </div>
    </div>
  </div>

  <!-- Battery (shown only if present) -->
  <div id="batterySection" style="display:none">
    <div class="section-label">Battery</div>
    <div class="glass battery-card">
      <div class="battery-icon-wrap">
        <div class="battery-fill bar-green" id="battFill" style="width:50%"></div>
      </div>
      <div class="battery-info">
        <div class="battery-pct"><span id="battPct">—</span><span style="font-size:14px;opacity:.5">%</span></div>
        <div class="battery-status" id="battStatus">—</div>
      </div>
    </div>
  </div>

  <!-- Processes -->
  <div class="proc-section-header">
    <div class="section-label" style="margin:28px 0 0 4px">Top Processes</div>
    <span class="proc-frozen-badge" id="frozenBadge">Frozen</span>
  </div>
  <button class="freeze-btn" id="freezeBtn" onclick="toggleFreeze()" style="margin-bottom:10px">
    <span class="freeze-icon">❄️</span>
    <span class="freeze-label">Freeze List</span>
  </button>
  <div class="glass" style="overflow:hidden">
    <div class="proc-col-header">
      <span class="ch-name">Name</span>
      <span class="ch-pid">PID</span>
      <span class="ch-cpu">CPU%</span>
      <span class="ch-mem">MEM%</span>
    </div>
    <div class="proc-list" id="procList">
      <div class="proc-row"><div class="skeleton"></div></div>
      <div class="proc-row"><div class="skeleton" style="width:80%"></div></div>
      <div class="proc-row"><div class="skeleton" style="width:50%"></div></div>
    </div>
  </div>

  <div class="timestamp" id="timestamp">—</div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCKap0-fY4SsAmEZSem_IKj0m6ixASbdEc",
    authDomain: "pcmonitor-fac8e.firebaseapp.com",
    projectId: "pcmonitor-fac8e",
    storageBucket: "pcmonitor-fac8e.firebasestorage.app",
    messagingSenderId: "675812595127",
    appId: "1:675812595127:web:84d830a890282ff9b34432"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  function setBar(barEl, pct) {
    barEl.style.width = Math.min(pct, 100) + '%';
  }

  function renderData(d) {
    document.getElementById('errorBanner').style.display = 'none';
    document.getElementById('hostname').textContent = `Updated ${d.timestamp}`;

    // CPU
    const cpuPct = d.cpu.percent;
    document.getElementById('cpuVal').innerHTML = `${cpuPct}<span>%</span>`;
    const cpuBar = document.getElementById('cpuBar');
    setBar(cpuBar, cpuPct);
    cpuBar.className = 'bar-fill ' + (cpuPct > 85 ? 'bar-red' : cpuPct > 65 ? 'bar-yellow' : 'bar-blue');

    // Memory
    const memPct = d.memory.percent;
    document.getElementById('memVal').innerHTML = `${memPct}<span>%</span>`;
    const memBar = document.getElementById('memBar');
    setBar(memBar, memPct);
    memBar.className = 'bar-fill ' + (memPct > 85 ? 'bar-red' : memPct > 65 ? 'bar-yellow' : 'bar-purple');

    // Disk
    const dp = d.disk.percent;
    document.getElementById('diskDetail').textContent = `${d.disk.used_gb} / ${d.disk.total_gb} GB`;
    const diskBar = document.getElementById('diskBar');
    setBar(diskBar, dp);
    diskBar.className = 'bar-fill ' + (dp > 85 ? 'bar-red' : dp > 65 ? 'bar-yellow' : 'bar-yellow');

    // Network
    document.getElementById('netRecv').textContent = d.network.recv_mb;
    document.getElementById('netSent').textContent = d.network.sent_mb;

    // Battery
    if (d.battery) {
      document.getElementById('batterySection').style.display = 'block';
      const bp = d.battery.percent;
      document.getElementById('battPct').textContent = bp;
      document.getElementById('battFill').style.width = bp + '%';
      document.getElementById('battStatus').textContent = d.battery.plugged ? '⚡ Charging' : '🔋 On Battery';
      document.getElementById('battFill').className = 'battery-fill ' + (bp < 20 ? 'bar-red' : bp < 50 ? 'bar-yellow' : 'bar-green');
    }

    // Processes — skip if frozen
    if (!frozen) {
      document.getElementById('procList').innerHTML = d.processes.map(p => `
        <div class="proc-row">
          <div class="proc-name" title="${p.name}">${p.name}</div>
          <div class="proc-pid">${p.pid}</div>
          <div class="proc-cpu">${p.cpu}</div>
          <div class="proc-mem">${p.mem}</div>
        </div>
      `).join('');
    }

    document.getElementById('timestamp').textContent = `Live via Firebase · ${d.timestamp}`;
  }


  // ── Freeze / Toast ────────────────────────────────────────────────────────
  let frozen = false;

  const toastMessages = [
    ["don't worry, sam's processes are still very much running."],
    ["this is a monitor, not a task manager. nothing happened."],
    ["the list is frozen. sam's pc is not."],
    ["froze the display, not the cpu. it's still going."],
    ["you froze a div. sam's pc remains unbothered."],
  ];
  let lastToastIdx = -1;

  function showToast(msg) {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    container.appendChild(el);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => el.classList.add('show'));
    });
    setTimeout(() => {
      el.classList.remove('show');
      el.classList.add('hide');
      setTimeout(() => el.remove(), 300);
    }, 3200);
  }

  function pickToast() {
    let idx;
    do { idx = Math.floor(Math.random() * toastMessages.length); }
    while (idx === lastToastIdx);
    lastToastIdx = idx;
    return toastMessages[idx][0];
  }

  window.toggleFreeze = function() {
    frozen = !frozen;
    const btn    = document.getElementById('freezeBtn');
    const badge  = document.getElementById('frozenBadge');
    const label  = btn.querySelector('.freeze-label');
    if (frozen) {
      btn.classList.add('frozen');
      badge.classList.add('visible');
      label.textContent = 'Unfreeze List';
      const msg = pickToast();
      showToast(msg);
    } else {
      btn.classList.remove('frozen');
      badge.classList.remove('visible');
      label.textContent = 'Freeze List';
    }
  };

  // Wrap renderData to respect freeze
  const _origRender = renderData;
  // patch process rendering to check frozen
  // Realtime listener — fires instantly whenever backend pushes new data
  onSnapshot(
    doc(db, "monitors", "main"),
    (snap) => {
      if (snap.exists()) renderData(snap.data());
    },
    (err) => {
      console.error(err);
      document.getElementById('errorBanner').style.display = 'block';
    }
  );
</script>
</body>
